name: qitak_app
description: "Qitak mobile marketplace app."
publish_to: "none"
version: 0.1.0+2

environment:
  sdk: ^3.11.1

dependencies:
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^10.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  image_picker: ^1.2.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  mime: ^2.0.0
  sentry_flutter: ^9.14.0
  share_plus: ^13.1.0
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.10.4

dev_dependencies:
  build_runner: ^2.8.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  integration_test:
    sdk: flutter
  intl_utils: ^2.8.12
  json_serializable: ^6.11.1
  sentry_dart_plugin: ^3.3.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/qitak-logo.png
    - docs/part_categories.json
    - docs/wilayas.json
    - docs/cars.json
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Variable.ttf
          weight: 400
        - asset: assets/fonts/cairo/Cairo-Variable.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-Variable.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Variable.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Variable.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 500
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/inter/Inter-Italic-Variable.ttf
          style: italic
          weight: 700

flutter_intl:
  enabled: true
  class_name: S
  main_locale: ar
  arb_dir: lib/l10n
  output_dir: lib/generated

sentry:
  dart_symbol_map_path: build/obfuscation.map.json
  upload_debug_symbols: true
  upload_sources: false
