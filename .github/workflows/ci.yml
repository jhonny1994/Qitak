name: CI

on:
  push:
    branches:
      - main
      - '0**-*'
    tags:
      - 'v*'
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze --fatal-infos

      - name: Flutter Tests
        run: flutter test

  supabase-db-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset DB
        run: supabase db reset

      - name: Run DB Tests
        run: supabase test db

  android-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - flutter
      - supabase-db-tests
    runs-on: ubuntu-latest
    env:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      APP_DEEP_LINK_BASE_URL: ${{ secrets.APP_DEEP_LINK_BASE_URL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Inject Android Firebase config
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          data = os.environ.get('GOOGLE_SERVICES_JSON_BASE64', '').strip()
          if not data:
              raise SystemExit('Missing GOOGLE_SERVICES_JSON_BASE64 secret.')
          Path('android/app/google-services.json').write_bytes(base64.b64decode(data))
          PY

      - name: Inject Firebase options (lib/firebase_options.dart)
        env:
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          data = os.environ.get('FIREBASE_OPTIONS_DART_BASE64', '').strip()
          if not data:
              raise SystemExit('Missing FIREBASE_OPTIONS_DART_BASE64 secret.')
          Path('lib/firebase_options.dart').write_bytes(base64.b64decode(data))
          PY

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          data = os.environ.get('ANDROID_KEYSTORE_BASE64', '').strip()
          if not data:
              raise SystemExit('Missing ANDROID_KEYSTORE_BASE64 secret.')
          Path(os.environ['RUNNER_TEMP']).joinpath('qitak-release.jks').write_bytes(
              base64.b64decode(data)
          )
          PY
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/qitak-release.jks" >> "$GITHUB_ENV"

      - name: Extract pubspec version
        id: pubspec
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build signed Android AAB
        run: >
          flutter build appbundle --release
          --obfuscate
          --split-debug-info=build/symbols
          --extra-gen-snapshot-options=--save-obfuscation-map=build/obfuscation.map.json
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=APP_DEEP_LINK_BASE_URL=${{ secrets.APP_DEEP_LINK_BASE_URL }}
          --dart-define=SENTRY_RELEASE=com.carbodex.qitak@${{ steps.pubspec.outputs.version }}+${{ github.run_number }}
          --build-name=${{ steps.pubspec.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Build signed Android APK
        run: >
          flutter build apk --release
          --obfuscate
          --split-debug-info=build/symbols
          --extra-gen-snapshot-options=--save-obfuscation-map=build/obfuscation.map.json
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=APP_DEEP_LINK_BASE_URL=${{ secrets.APP_DEEP_LINK_BASE_URL }}
          --dart-define=SENTRY_RELEASE=com.carbodex.qitak@${{ steps.pubspec.outputs.version }}+${{ github.run_number }}
          --build-name=${{ steps.pubspec.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Upload debug symbols to Sentry
        run: dart run sentry_dart_plugin
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: com.carbodex.qitak@${{ steps.pubspec.outputs.version }}+${{ github.run_number }}

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - android-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: release-artifacts/

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Qitak ${{ github.ref_name }}"
          body: |
            ## قطعك ${{ github.ref_name }}

            سوق قطع السيارات المستعملة في الجزائر.

            ### التثبيت
            - **APK** — للتثبيت المباشر على Android
            - **AAB** — حزمة Android App Bundle

            > المتطلبات: Android 8.0+
          files: |
            release-artifacts/*.aab
            release-artifacts/*.apk

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - flutter
      - supabase-db-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
